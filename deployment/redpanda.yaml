---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
spec:
  selector:
    app: redpanda
  ports:
    - name: broker
      port: 9092
      targetPort: 9092

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: redpandadata/redpanda:v25.3.10-fips
        args:
          - redpanda
          - start
          - --overprovisioned
          - --smp 1
          - --memory 1G
          - --reserve-memory 0M
          - --node-id 0
          - --check=false
          - --kafka-addr 0.0.0.0:9092
          - --advertise-kafka-addr redpanda:9092
        ports:
          - containerPort: 9092
