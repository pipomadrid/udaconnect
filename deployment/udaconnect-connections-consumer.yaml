apiVersion: apps/v1
kind: Deployment
metadata:
  name: udaconnect-connections-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udaconnect-connections-consumer
  template:
    metadata:
      labels:
        app: udaconnect-connections-consumer
    spec:
      containers:
      - name: consumer
        image:  pedrosaez/udaconnect-connections:1.0.0
        command: ["python"]
        args: ["run_consumer.py"]
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: redpanda:9092
        - name: DB_HOST
          value: postgres
        - name: DB_USERNAME
          valueFrom:
            configMapKeyRef:
              name: db-env
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: db-env
              key: DB_NAME
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: db-env
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: db-env
              key: DB_PORT
        - name: PERSON_SERVICE_HOST
          value: "udaconnect-person"
